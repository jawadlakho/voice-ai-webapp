<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Voice AI Studio | Text-Speech & Speech-Text</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🎙️ Voice AI Studio</h1>
            <p>Text → Speech · Speech → Text · Neural Voices · Real-time Transcription</p>
        </div>

        <div class="dashboard">
            <!-- LEFT CARD: TEXT → SPEECH -->
            <div class="card">
                <div class="card-title">
                    <span>🔊</span> Text to Speech
                </div>
                <div class="control-group">
                    <label>📝 Input Text</label>
                    <textarea id="ttsText" placeholder="Type or paste any text... AI will speak it with emotion & clarity.">Hello! Welcome to Voice AI Studio. Adjust voice, speed, and language. This is my portfolio project.</textarea>
                </div>
                <div class="row-2col">
                    <div class="control-group" style="flex:1">
                        <label>🌐 Language</label>
                        <select id="ttsLang"></select>
                    </div>
                    <div class="control-group" style="flex:1">
                        <label>🗣️ Voice</label>
                        <select id="ttsVoice"></select>
                    </div>
                </div>
                <div class="control-group">
                    <label>⚡ Speed (0.5x – 2x)</label>
                    <input type="range" id="rateSlider" min="0.5" max="2" step="0.05" value="1">
                    <span id="rateValue" style="display: inline-block; background:#0f1422; padding:0.2rem 0.8rem; border-radius:20px; margin-top:0.4rem; font-size:0.8rem;">1.00x</span>
                </div>
                <div class="flex-btns">
                    <button id="speakBtn" class="btn-primary">▶️ Speak</button>
                    <button id="stopSpeechBtn">⏹️ Stop</button>
                </div>
                <div class="status-badge" id="ttsStatus">⚡ Ready to speak</div>
            </div>

            <!-- RIGHT CARD: SPEECH → TEXT -->
            <div class="card">
                <div class="card-title">
                    <span>🎤</span> Speech to Text
                </div>
                <div class="control-group">
                    <label>🎙️ Recording & Transcription</label>
                    <button id="micBtn" class="btn-primary">🎙️ Start Recording</button>
                    <div class="status-badge" id="sttStatus" style="margin-top: 0.7rem;">● Idle · Click mic to begin</div>
                </div>
                <div class="control-group">
                    <label>📄 Recognized Text</label>
                    <textarea id="sttOutput" rows="3" placeholder="Your speech will appear here..."></textarea>
                </div>
                <div class="control-group">
                    <label>🌍 Recognition Language</label>
                    <select id="sttLangSelect">
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                        <option value="es-ES">Spanish</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="it-IT">Italian</option>
                        <option value="ja-JP">Japanese</option>
                        <option value="ko-KR">Korean</option>
                        <option value="zh-CN">Chinese (Mandarin)</option>
                        <option value="hi-IN">Hindi</option>
                    </select>
                </div>
                <div class="flex-btns">
                    <button id="copySttBtn">📋 Copy Text</button>
                    <button id="downloadSttBtn">💾 Download .txt</button>
                </div>
                <hr>
                <div class="control-group">
                    <label>📎 TTS Output Options</label>
                    <div class="flex-btns">
                        <button id="copyTtsTextBtn">📋 Copy TTS Text</button>
                        <button id="downloadTtsTextBtn">💾 Download Transcript</button>
                    </div>
                    <small style="color:#7e8ab0;">Save your generated text or download spoken transcript</small>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
